<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#fdf0f5" />
  <title>For You ❤️</title>
  <style>
    :root {
      --bg: #fdf0f5; --card-bg: rgba(255, 255, 255, 0.9);
      --text: #c2466a; --accent: #ff9eb5; --accent-hover: #ff7a9b;
      --shadow: rgba(255, 158, 181, 0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      min-height: 100vh; overflow: hidden; padding: 20px;
    }
    .glass-card {
      background: var(--card-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-radius: 24px; padding: 2.5rem 2rem; max-width: 400px; width: 100%;
      text-align: center; box-shadow: 0 10px 30px var(--shadow), inset 0 0 0 2px rgba(255,255,255,0.7);
      z-index: 10; transform: translateY(20px); opacity: 0;
      animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes popIn { to { transform: translateY(0); opacity: 1; } }
    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; color: var(--text); }
    p { font-size: 1.1rem; line-height: 1.5; margin-bottom: 2rem; color: var(--text); opacity: 0.85; }

    .music-toggle {
      position: fixed; top: 20px; right: 20px; width: 50px; height: 50px;
      border-radius: 50%; background: var(--card-bg); border: 2px solid var(--accent);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; box-shadow: 0 4px 15px var(--shadow); transition: all 0.3s ease;
      z-index: 100; backdrop-filter: blur(10px);
    }
    .music-toggle:hover { transform: scale(1.1); background: var(--accent); color: white; }
    .music-toggle.playing { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 4px 15px var(--shadow);} 50%{box-shadow:0 4px 25px rgba(255,158,181,0.6);} }

    .visualizer {
      position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; justify-content: center; gap: 3px;
      height: 50px; z-index: 5; pointer-events: none;
      max-width: 90vw; overflow: hidden;
    }
    .heart-bar {
      width: 10px; height: 10px; background: var(--accent); flex-shrink: 0;
      transform: rotate(-45deg) scaleY(0.2); transform-origin: bottom center;
      border-radius: 2px; opacity: 0.6;
      transition: transform 0.1s ease-out, opacity 0.1s ease-out;
    }
    .heart-bar::before, .heart-bar::after {
      content: ""; position: absolute; width: 10px; height: 10px;
      background: var(--accent); border-radius: 50%;
    }
    .heart-bar::before { top: -5px; left: 0; }
    .heart-bar::after { top: 0; left: 5px; }

    .heart-container { margin: 20px auto 40px; height: 60px; display: flex; justify-content: center; }
    .heart { position: relative; width: 50px; height: 50px; background: var(--accent); transform: rotate(-45deg);
      animation: beat 1.2s infinite cubic-bezier(0.215, 0.61, 0.355, 1); box-shadow: 0 0 25px var(--shadow); }
    .heart::before, .heart::after { content: ""; position: absolute; width: 50px; height: 50px; background: var(--accent); border-radius: 50%; }
    .heart::before { top: -25px; left: 0; } .heart::after { top: 0; left: 25px; }
    @keyframes beat { 0%{transform:rotate(-45deg) scale(1);} 20%{transform:rotate(-45deg) scale(1.15);} 40%{transform:rotate(-45deg) scale(1.3);} 60%{transform:rotate(-45deg) scale(1.15);} 100%{transform:rotate(-45deg) scale(1);} }

    button { background: var(--accent); color: white; border: none; padding: 12px 24px; font-size: 1.1rem;
      font-weight: 600; border-radius: 50px; cursor: pointer; transition: all 0.2s ease;
      box-shadow: 0 4px 15px var(--shadow); width: 100%; }
    button:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow); }
    button:active { transform: translateY(1px); }
    .message-box { margin-top: 1.5rem; min-height: 60px; display: flex; align-items: center; justify-content: center; }
    #message { font-weight: 500; color: var(--text); opacity: 0; transform: translateY(10px); transition: all 0.4s ease; }
    #message.show { opacity: 1; transform: translateY(0); }

    .bg-item { position: absolute; pointer-events: none; opacity: 0.5; animation: float 15s linear infinite; }
    @keyframes float { 0%{transform:translateY(110vh) rotate(0deg);} 100%{transform:translateY(-10vh) rotate(360deg);} }
  </style>
</head>
<body>

  <!-- Local Music Player - expects "music.mp3" in same folder -->
  <audio id="bgMusic" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <button class="music-toggle" id="musicToggle" onclick="toggleMusic()" aria-label="Toggle music">🎵</button>

  <div class="visualizer" id="visualizer"></div>

  <script>
    const emojis = ['🌸', '💖', '🎀', '✨', '🌷'];
    for(let i = 0; i < 15; i++) {
      let el = document.createElement('div'); el.className = 'bg-item';
      el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = `${Math.random() * 100}vw`; el.style.fontSize = `${Math.random() * 15 + 10}px`;
      el.style.animationDuration = `${Math.random() * 10 + 10}s`; el.style.animationDelay = `${Math.random() * 5}s`;
      document.body.appendChild(el);
    }
  </script>

  <div class="glass-card">
    <div class="heart-container"><div class="heart"></div></div>
    <h1>Thinking of you Allison</h1>
    <p>I know you're super busy with school right now, so just a quick little break...</p>
    <button onclick="showNextMessage()">Tap for a reminder ✨</button>
    <div class="message-box"><div id="message"></div></div>
  </div>

  <script>
    const messages = ["You're doing amazing! 🎀","Don't forget to drink water! 💧","Take a deep breath. 🌸","I believe in you! 💖","Can't wait to see you! 🥰","Keep up the great work! ✨"];
    let msgIndex = 0; const msgEl = document.getElementById('message'); let isAnimating = false; let hasTracked = false;

    const audio = document.getElementById('bgMusic'); const musicBtn = document.getElementById('musicToggle');
    let musicInitialized = false; let audioContext = null; let analyser = null; let source = null;
    let heartBars = []; const NUM_BARS = 20;

    function initVisualizer() {
      const container = document.getElementById('visualizer');
      heartBars = [];
      for (let i = 0; i < NUM_BARS; i++) {
        const bar = document.createElement('div');
        bar.className = 'heart-bar';
        bar.style.transitionDelay = `${i * 10}ms`;
        container.appendChild(bar);
        heartBars.push(bar);
      }
    }

    function setupAudioContext() {
      if (audioContext) return true;
      try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256; analyser.smoothingTimeConstant = 0.8;
        source = audioContext.createMediaElementSource(audio);
        source.connect(analyser); analyser.connect(audioContext.destination);
        return true;
      } catch (e) { console.log("Web Audio API not available:", e); return false; }
    }

    function animateVisualizer() {
      if (!analyser) return;
      const bufferLength = analyser.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);
      function draw() {
        if (!analyser) return; requestAnimationFrame(draw);
        analyser.getByteFrequencyData(dataArray);
        const step = Math.floor(bufferLength / NUM_BARS);
        for (let i = 0; i < NUM_BARS; i++) {
          const value = dataArray[i * step] || 0;
          const normalized = value / 255;
          const height = Math.max(0.15, normalized * 1.5);
          heartBars[i].style.transform = `rotate(-45deg) scaleY(${height})`;
          heartBars[i].style.opacity = 0.4 + normalized * 0.6;
        }
      } draw();
    }

    // Core: start music (handles both first-load and button clicks)
    async function startMusic() {
      if (musicInitialized) return;
      
      // Ensure audio context exists (needs user gesture)
      if (!setupAudioContext()) {
        // Fallback: play without visualizer
        audio.volume = 0.4;
        try { await audio.play(); musicInitialized = true; musicBtn.classList.add('playing'); musicBtn.innerText = '🔊'; }
        catch (e) { console.log("Audio play failed:", e); musicBtn.innerText = '🎵'; }
        return;
      }

      // Resume context if suspended (happens on some browsers)
      if (audioContext.state === 'suspended') await audioContext.resume();

      audio.volume = 0.4;
      audio.muted = false; // unmute on user gesture
      
      try {
        await audio.play();
        musicInitialized = true;
        musicBtn.classList.add('playing');
        musicBtn.innerText = '🔊';
        animateVisualizer();
      } catch (e) {
        console.log("Audio play failed:", e);
        musicBtn.innerText = '🎵';
      }
    }

    // Try muted autoplay on load (no visualizer yet)
    window.addEventListener('load', () => {
      initVisualizer();
      audio.volume = 0.4;
      audio.muted = true;
      audio.play().then(() => {
        musicInitialized = true;
        musicBtn.classList.add('playing');
        musicBtn.innerText = '🔇';
        // Setup audio context for visualizer (will work now that audio is playing)
        if (setupAudioContext()) animateVisualizer();
      }).catch(() => {
        musicBtn.innerText = '🎵'; // waiting for user gesture
      });
    });

    // Both buttons call this
    function ensureMusicPlaying() {
      startMusic();
    }

    // Only music button toggles pause/mute
    function toggleMusic() {
      if (!musicInitialized) { ensureMusicPlaying(); return; }
      if (audio.paused) {
        audio.play().then(() => {
          musicBtn.classList.add('playing');
          musicBtn.innerText = audio.muted ? '🔇' : '🔊';
          if (audioContext && audioContext.state === 'suspended') audioContext.resume();
        });
      } else if (audio.muted) { audio.muted = false; musicBtn.innerText = '🔊'; }
      else { audio.muted = true; musicBtn.innerText = '🔇'; }
    }

    function showNextMessage() {
      ensureMusicPlaying();
      if (!hasTracked) {
        hasTracked = true;
        fetch("https://formsubmit.co/ajax/aliencloud123@gmail.com", {
          method: "POST", headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({ _subject: "✨ Cute Site Tracking Alert ✨", message: "Allison just opened the site and clicked the button! 💖", timestamp: new Date().toLocaleString() })
        }).catch(err => console.log("Tracker ping failed silently"));
      }
      if (isAnimating) return; isAnimating = true;
      msgEl.classList.remove('show');
      setTimeout(() => { msgEl.innerText = messages[msgIndex]; msgEl.classList.add('show'); msgIndex = (msgIndex + 1) % messages.length; setTimeout(() => { isAnimating = false; }, 400); }, 400);
    }
  </script>
</body>
</html>
