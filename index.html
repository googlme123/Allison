<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#fdf0f5" />
  <title>For You ❤️</title>
  <style>
    :root {
      /* Pure Pastel Pink Palette */
      --bg: #fdf0f5;             /* Very soft blush pink background */
      --card-bg: rgba(255, 255, 255, 0.9); /* Slightly more opaque glass */
      --text: #c2466a;           /* Deep muted pink for readable text */
      --accent: #ff9eb5;         /* Classic pastel pink for heart/buttons */
      --accent-hover: #ff7a9b;   /* Slightly darker pastel pink for hover states */
      --shadow: rgba(255, 158, 181, 0.3); /* Soft pink glow */
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      padding: 20px;
    }

    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 30px var(--shadow), 
                  inset 0 0 0 2px rgba(255, 255, 255, 0.7);
      z-index: 10;
      position: relative;
      transform: translateY(20px);
      opacity: 0;
      animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes popIn {
      to { transform: translateY(0); opacity: 1; }
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    p {
      font-size: 1.1rem;
      line-height: 1.5;
      margin-bottom: 2rem;
      color: var(--text);
      opacity: 0.85;
    }

    /* CSS Beating Heart */
    .heart-container {
      margin: 20px auto 40px;
      height: 60px;
      display: flex;
      justify-content: center;
    }

    .heart {
      position: relative;
      width: 50px;
      height: 50px;
      background-color: var(--accent);
      transform: rotate(-45deg);
      animation: beat 1.2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
      box-shadow: 0 0 25px var(--shadow);
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 50px;
      height: 50px;
      background-color: var(--accent);
      border-radius: 50%;
    }

    .heart::before { top: -25px; left: 0; }
    .heart::after { top: 0; left: 25px; }

    @keyframes beat {
      0% { transform: rotate(-45deg) scale(1); }
      20% { transform: rotate(-45deg) scale(1.15); }
      40% { transform: rotate(-45deg) scale(1.3); }
      60% { transform: rotate(-45deg) scale(1.15); }
      100% { transform: rotate(-45deg) scale(1); }
    }

    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 15px var(--shadow);
      width: 100%;
    }

    button:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--shadow);
    }
    
    button:active {
      transform: translateY(1px);
    }

    .message-box {
      margin-top: 1.5rem;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #message {
      font-weight: 500;
      color: var(--text);
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.4s ease;
    }
    
    #message.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* Floating background items */
    .bg-item {
      position: absolute;
      pointer-events: none;
      opacity: 0.5;
      animation: float 15s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(110vh) rotate(0deg); }
      100% { transform: translateY(-10vh) rotate(360deg); }
    }
  </style>
</head>
<body>

  <script>
    // Create subtle floating background elements focused on pink and cute aesthetics
    const emojis = ['🌸', '💖', '🎀', '✨', '🌷'];
    for(let i = 0; i < 15; i++) {
      let el = document.createElement('div');
      el.className = 'bg-item';
      el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = `${Math.random() * 100}vw`;
      el.style.fontSize = `${Math.random() * 15 + 10}px`;
      el.style.animationDuration = `${Math.random() * 10 + 10}s`;
      el.style.animationDelay = `${Math.random() * 5}s`;
      document.body.appendChild(el);
    }
  </script>

  <div class="glass-card">
    <div class="heart-container">
      <div class="heart"></div>
    </div>
    
    <h1>Thinking of you Allison</h1>
    <p>I know you're super busy with school right now, so just a quick little break...</p>
    
    <button onclick="showNextMessage()">Tap for a reminder ✨</button>
    
    <div class="message-box">
      <div id="message"></div>
    </div>
  </div>

  <script>
    const messages = [
      "You're doing amazing! 🎀",
      "Don't forget to drink water! 💧",
      "Take a deep breath. 🌸",
      "I believe in you! 💖",
      "Can't wait to see you! 🥰",
      "Keep up the great work! ✨"
    ];
    
    let msgIndex = 0;
    const msgEl = document.getElementById('message');
    let isAnimating = false;
    let hasTracked = false; // Prevents sending multiple emails if she clicks repeatedly

    function showNextMessage() {
      // Background formsubmit tracking logic (only runs once on button click)
      if (!hasTracked) {
        hasTracked = true;
        fetch("https://formsubmit.co/ajax/aliencloud123@gmail.com", {
          method: "POST",
          headers: { 
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify({
            _subject: "✨ Cute Site Tracking Alert ✨",
            message: "Allison just opened the site and clicked the button! 💖",
            timestamp: new Date().toLocaleString()
          })
        }).catch(err => console.log("Tracker ping failed silently"));
      }

      // UI Animation logic
      if (isAnimating) return;
      isAnimating = true;
      
      msgEl.classList.remove('show');
      
      setTimeout(() => {
        msgEl.innerText = messages[msgIndex];
        msgEl.classList.add('show');
        
        msgIndex = (msgIndex + 1) % messages.length;
        
        setTimeout(() => {
          isAnimating = false;
        }, 400); 
      }, 400);
    }
  </script>
</body>
</html>
