<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Do You Love Allen?</title>
  <meta name="description" content="A playful love confession page with a mischievous No button, one-time Yes confirmation, and optional email event tracking." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem; --space-5: 1.25rem;
      --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem;
      --radius-full: 9999px;
      --shadow-sm: 0 10px 30px rgba(191, 72, 123, 0.12);
      --shadow-lg: 0 20px 50px rgba(191, 72, 123, 0.2);
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --font-display: 'Baloo 2', cursive;
      --font-body: 'Nunito', sans-serif;
      --bg1: #fff6fb;
      --bg2: #ffe6f1;
      --surface: rgba(255,255,255,0.72);
      --surface-strong: rgba(255,255,255,0.92);
      --surface-border: rgba(191, 72, 123, 0.16);
      --text: #55233d;
      --muted: #8f5f75;
      --yes: #e64d93;
      --yes-hover: #cc397d;
      --no: #ffffff;
      --no-text: #8c4e69;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--text);
      background:
        radial-gradient(circle at top left, #ffd0e6 0%, transparent 30%),
        radial-gradient(circle at bottom right, #ffd8ea 0%, transparent 35%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-text-size-adjust: 100%;
    }

    .wrap {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: clamp(0.75rem, 2vw, 1.5rem);
      position: relative;
      isolation: isolate;
    }

    .blob, .blob::after {
      position: absolute;
      border-radius: 50%;
      filter: blur(30px);
      z-index: -1;
      opacity: 0.7;
    }
    .blob {
      width: 280px;
      height: 280px;
      background: rgba(255, 170, 204, 0.55);
      top: 8%; left: 8%;
      animation: drift 8s ease-in-out infinite alternate;
    }
    .blob::after {
      content: "";
      width: 220px;
      height: 220px;
      right: -420px;
      bottom: -280px;
      background: rgba(255, 122, 171, 0.35);
      animation: drift 10s ease-in-out infinite alternate-reverse;
    }

    .card {
      width: min(94vw, 720px);
      padding: clamp(1rem, 4vw, 3rem);
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: 28px;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(16px);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: 0.5rem 0.9rem;
      border-radius: var(--radius-full);
      background: rgba(230, 77, 147, 0.1);
      color: var(--yes-hover);
      font-size: var(--text-sm);
      font-weight: 700;
      margin-bottom: var(--space-4);
    }

    h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(2.1rem, 7vw, 4.8rem);
      line-height: 0.95;
      letter-spacing: 0.01em;
    }

    .sub {
      margin: var(--space-4) auto 0;
      color: var(--muted);
      max-width: 34ch;
      font-size: var(--text-lg);
    }

    .stage {
      margin-top: var(--space-10);
      min-height: 420px;
      position: relative;
    }

    .btn-row {
      position: relative;
      width: 100%;
      height: 340px;
    }

    button {
      min-width: 132px;
      min-height: 56px;
      padding: 0.9rem 1.35rem;
      border-radius: var(--radius-full);
      font-weight: 800;
      font-size: var(--text-base);
      border: 0;
      transition: transform var(--transition), background var(--transition), opacity var(--transition), box-shadow var(--transition);
      box-shadow: var(--shadow-sm);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    button:focus-visible {
      outline: 3px solid rgba(230, 77, 147, 0.35);
      outline-offset: 4px;
    }

    .yes {
      background: var(--yes);
      color: white;
      position: absolute;
      left: 50%;
      top: 28%;
      transform: translate(-50%, -50%);
    }
    .yes:hover { background: var(--yes-hover); }

    .no {
      background: var(--no);
      color: var(--no-text);
      position: absolute;
      left: 50%;
      top: 58%;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(140, 78, 105, 0.15);
    }

    .hint, .status {
      margin-top: var(--space-3);
      min-height: 1.5em;
      font-size: 0.95rem;
      color: var(--muted);
      word-break: break-word;
    }

    .confirm,
    .result {
      display: none;
      margin-top: var(--space-6);
      animation: popIn 420ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    .confirm.show,
    .result.show { display: block; }

    .confirm-box {
      margin-inline: auto;
      max-width: 480px;
      padding: 1.3rem;
      background: var(--surface-strong);
      border: 1px solid var(--surface-border);
      border-radius: 24px;
      box-shadow: var(--shadow-sm);
    }

    .confirm-title {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      margin-bottom: var(--space-3);
      color: var(--yes-hover);
    }

    .confirm-copy {
      color: var(--muted);
      margin-bottom: var(--space-5);
      font-size: 1.05rem;
    }

    .confirm-actions {
      display: flex;
      justify-content: center;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .btn-confirm {
      background: var(--yes);
      color: white;
    }
    .btn-confirm:hover { background: var(--yes-hover); }

    .btn-cancel {
      background: white;
      color: var(--no-text);
      border: 1px solid rgba(140, 78, 105, 0.15);
    }

    .love {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 4rem);
      color: var(--yes-hover);
      line-height: 1;
      margin-bottom: var(--space-3);
    }

    .hearts {
      font-size: clamp(2rem, 5vw, 4rem);
      animation: pulse 1.2s ease-in-out infinite;
    }

    .mini-heart {
      position: absolute;
      font-size: 1.5rem;
      pointer-events: none;
      animation: floatUp 1.6s ease-out forwards;
      opacity: 0;
    }

    @keyframes drift {
      from { transform: translate3d(0,0,0) scale(1); }
      to { transform: translate3d(20px, -12px, 0) scale(1.08); }
    }
    @keyframes popIn {
      from { opacity: 0; transform: translateY(18px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    @keyframes floatUp {
      0% { opacity: 0; transform: translateY(20px) scale(0.8); }
      20% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-120px) scale(1.2) rotate(12deg); }
    }

    @media (max-width: 640px) {
      .wrap { align-items: start; }
      .card { padding: 1rem; border-radius: 22px; }
      .badge { margin-bottom: 0.75rem; }
      h1 { font-size: clamp(2.1rem, 10vw, 3.2rem); }
      .sub { font-size: 1rem; }
      .stage { min-height: 470px; }
      .btn-row { min-height: 360px; height: 360px; }
      .yes,
      .no {
        left: 50%;
        min-width: min(78vw, 280px);
      }
      .yes { top: 24%; }
      .no { top: 58%; }
      .hint, .status { font-size: 0.92rem; }
      .confirm, .result { margin-top: 1rem; }
      .confirm-box { padding: 1rem; }
      .confirm-title { font-size: 1.9rem; }
      .confirm-copy { font-size: 1rem; }
      .confirm-actions { flex-direction: column; align-items: stretch; }
      .confirm-actions button { width: 100%; min-height: 52px; font-size: 1.05rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="blob" aria-hidden="true"></div>
    <section class="card" aria-label="Love question card">
      <div class="badge">💗 Tiny important question</div>
      <h1>Do you love Allen?</h1>
      <p class="sub">Choose carefully... one button is very committed to the outcome.</p>

      <div class="stage">
        <div class="btn-row" id="playArea">
          <button class="yes" id="yesBtn" type="button">Yes</button>
          <button class="no" id="noBtn" type="button" aria-label="No, but this button will keep moving">No</button>
        </div>

        <p class="hint" id="hint">Try clicking whichever one feels right.</p>
        <p class="status" id="status" aria-live="polite"></p>

        <div class="confirm" id="confirmBox" aria-live="polite">
          <div class="confirm-box">
            <div class="confirm-title">Are you sure?</div>
            <p class="confirm-copy">You can’t go back on this one 💞</p>
            <div class="confirm-actions">
              <button class="btn-confirm" id="finalYesBtn" type="button">I’m sure</button>
              <button class="btn-cancel" id="cancelBtn" type="button">Wait...</button>
            </div>
          </div>
        </div>

        <div class="result" id="result" aria-live="polite">
          <div class="love">I love you too Allison ❤️</div>
          <div class="hearts" aria-hidden="true">💖 💕 💘</div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const FORM_ENDPOINT = 'https://formsubmit.co/ajax/aliencloud123@gmail.com';
    const noBtn = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');
    const finalYesBtn = document.getElementById('finalYesBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const playArea = document.getElementById('playArea');
    const result = document.getElementById('result');
    const confirmBox = document.getElementById('confirmBox');
    const hint = document.getElementById('hint');
    const status = document.getElementById('status');

    let dodgeCount = 0;
    let noScale = 1;
    let hiddenNo = false;
    let awaitingFinalYes = false;

    const hints = [
      'Hmm... that did not seem very convincing.',
      'The No button has entered evasive mode.',
      'It is getting harder to be negative here.',
      'At this point the Yes button seems easier.',
      'Interesting strategy. The button disagrees.',
      'Only one answer is really surviving now.'
    ];

    function randomWithin(min, max) {
      return Math.random() * (max - min) + min;
    }

    async function logEvent(type) {
      const data = {
        _subject: 'Allen site event',
        _template: 'table',
        _captcha: 'false',
        _url: window.location.href,
        event_type: type,
        event_time: new Date().toISOString(),
        dodge_count: String(dodgeCount),
        page_title: document.title,
        user_agent: navigator.userAgent
      };
      try {
        const res = await fetch(FORM_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify(data)
        });
        status.textContent = res.ok ? 'Tracking event sent.' : 'Tracking request sent, but activation may still be required.';
      } catch (err) {
        status.textContent = 'Tracking could not reach FormSubmit from this browser right now.';
      }
    }

    function moveNoButton() {
      if (hiddenNo) return;
      const areaRect = playArea.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();
      const padding = 8;
      const maxX = areaRect.width - btnRect.width - padding;
      const maxY = areaRect.height - btnRect.height - padding;
      const x = Math.max(padding, randomWithin(padding, Math.max(padding, maxX)));
      const y = Math.max(padding, randomWithin(padding, Math.max(padding, maxY)));
      noBtn.style.left = `${x}px`;
      noBtn.style.top = `${y}px`;
      noBtn.style.transform = 'translate(0, 0)';
    }

    function shrinkNoButton() {
      dodgeCount += 1;
      noScale *= 0.82;
      noBtn.style.transform = `translate(0, 0) scale(${noScale})`;
      noBtn.style.transformOrigin = 'center';
      hint.textContent = hints[(dodgeCount - 1) % hints.length];
      if (dodgeCount >= 6 || noScale < 0.18) {
        hiddenNo = true;
        noBtn.style.opacity = '0';
        noBtn.style.pointerEvents = 'none';
        noBtn.setAttribute('aria-hidden', 'true');
        hint.textContent = 'Looks like only Yes remains.';
      }
    }

    function dodge() {
      moveNoButton();
      shrinkNoButton();
      logEvent('no_dodged');
    }

    function launchHearts() {
      for (let i = 0; i < 12; i++) {
        const heart = document.createElement('span');
        heart.className = 'mini-heart';
        heart.textContent = ['💖','💕','💗','❤️'][i % 4];
        heart.style.left = `${randomWithin(15, 85)}%`;
        heart.style.top = `${randomWithin(55, 85)}%`;
        heart.style.animationDelay = `${i * 70}ms`;
        document.querySelector('.card').appendChild(heart);
        setTimeout(() => heart.remove(), 1800);
      }
    }

    ['mouseenter', 'pointerdown', 'touchstart'].forEach(evt => {
      noBtn.addEventListener(evt, (e) => { e.preventDefault(); dodge(); }, { passive: false });
    });

    noBtn.addEventListener('click', (e) => { e.preventDefault(); dodge(); });

    yesBtn.addEventListener('click', () => {
      if (awaitingFinalYes) return;
      awaitingFinalYes = true;
      confirmBox.classList.add('show');
      hint.textContent = 'This is your official confirmation moment.';
      logEvent('yes_first_click');
    });

    finalYesBtn.addEventListener('click', () => {
      confirmBox.classList.remove('show');
      result.classList.add('show');
      hint.textContent = 'Correct answer detected.';
      noBtn.style.opacity = '0';
      noBtn.style.pointerEvents = 'none';
      hiddenNo = true;
      logEvent('yes_confirmed');
      launchHearts();
    });

    cancelBtn.addEventListener('click', () => {
      awaitingFinalYes = false;
      confirmBox.classList.remove('show');
      hint.textContent = 'Okay... but the question still stands.';
      logEvent('yes_confirmation_cancelled');
    });

    window.addEventListener('resize', () => {
      if (!hiddenNo && dodgeCount > 0) moveNoButton();
    });
  </script>
</body>
</html>
